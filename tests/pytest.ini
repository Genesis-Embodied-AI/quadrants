[pytest]
markers =
    run_in_serial: mark test to run serially(usually for resource intensive tests).
    sm70: Can only run on GPU with compute capability 7.0 or higher.
    needs_torch: mark test as requiring PyTorch.
    slow: mark test (or parametrize case) as slow. Skipped by default by tests/run_tests.py; pass --run-slow to include, or `pytest -m slow` directly to run only the slow ones.
    sample(fraction=None, n=None): per-test stochastic parametrize subsampling. Pass exactly one of `fraction` (0..1) or `n` (>= 1). See docs/source/user_guide/unit_testing.md for the reproducibility recipes.
