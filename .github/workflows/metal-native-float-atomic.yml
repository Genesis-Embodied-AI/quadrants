name: Metal native float atomic A/B (FEM99)

on:
  push:
    branches:
      - hp/metal-native-float-atomics
  workflow_dispatch:

# Investigate the Jan 2023 FIXME in metal_device.mm ("floating point atomics doesn't work and
# breaks the FEM99/FEM128 examples"). Builds Metal-enabled Quadrants once, then runs the new
# headless FEM99 / AD-reduce tests twice on macos-15:
#   cas    = default (QD_METAL_NATIVE_FLOAT_ATOMICS unset) -> uint CAS path
#   native = QD_METAL_NATIVE_FLOAT_ATOMICS=1               -> OpAtomicFAddEXT / atomic_float
# If the alleged bug still exists, `native` should fail while `cas` passes.

jobs:
  # C++ unchanged since run 29579311383 (only tests/workflow added). Rebuild only when
  # FORCE_REBUILD=1 or metal_device.mm changes; otherwise reuse that wheel via gh.
  build:
    name: build-macos-15
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reuse previous wheel if C++ unchanged
        id: reuse
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_REBUILD: ${{ vars.FORCE_REBUILD || '0' }}
        run: |
          mkdir -p dist
          if [ "$FORCE_REBUILD" = "1" ]; then echo "reuse=no" >> "$GITHUB_OUTPUT"; exit 0; fi
          # Prefer the last successful build artifact from this workflow on this branch.
          run_id=$(gh api "repos/${{ github.repository }}/actions/workflows/metal-native-float-atomic.yml/runs?branch=${{ github.ref_name }}&status=completed&per_page=5" \
            --jq '.workflow_runs[] | select(.conclusion=="success" or .conclusion=="failure") | .id' | head -1)
          echo "candidate_run=$run_id"
          if [ -n "$run_id" ] && gh run download "$run_id" -n mac_wheel_fem99 -D dist 2>/dev/null; then
            ls -la dist/
            echo "reuse=yes" >> "$GITHUB_OUTPUT"
          else
            echo "reuse=no" >> "$GITHUB_OUTPUT"
          fi
      - name: Prerequisites
        if: steps.reuse.outputs.reuse != 'yes'
        run: bash .github/workflows/scripts_new/macosx/1_prerequisites.sh
      - name: Build wheel
        if: steps.reuse.outputs.reuse != 'yes'
        run: bash .github/workflows/scripts_new/macosx/2_build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: mac_wheel_fem99
          path: dist/*.whl

  ab:
    name: ${{ matrix.arm }}
    needs: build
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        arm: [cas, native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: mac_wheel_fem99
          path: dist
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl
          pip install --prefer-binary --group test || pip install pytest numpy
          python -c "import quadrants as qd; print('qd_ok')"
      - name: System info
        run: |
          sysctl -n machdep.cpu.brand_string || true
          system_profiler SPDisplaysDataType 2>/dev/null | head -30 || true
      - name: Step 0 - minimal atomic_add (no pytest, dump MSL)
        run: |
          if [ "${{ matrix.arm }}" = "native" ]; then export QD_METAL_NATIVE_FLOAT_ATOMICS=1; else unset QD_METAL_NATIVE_FLOAT_ATOMICS; fi
          export QD_DUMP_MSL=1
          echo "ARM=${{ matrix.arm }} step=0 env=${QD_METAL_NATIVE_FLOAT_ATOMICS:-<unset>}"
          set +e
          python tests/python/metal_native_atomic_min.py > min.out 2> min.err
          ec=$?
          echo "----- min.out -----"; cat min.out
          echo "----- min.err (MSL dump / diagnostics, first 200 lines) -----"; head -200 min.err
          echo "----- min.err atomic/MSL hits -----"; rg -n "atomic_fetch|atomic_float|=== MSL|Compilation|cannot create|Abort|WORKLOAD_" min.err min.out | head -60 || true
          echo "########## RESULT arm=${{ matrix.arm }} step=0_min exit=$ec ##########"
          exit $ec
      - name: Step A - small AD scalar reduce only
        if: success() || failure()
        run: |
          if [ "${{ matrix.arm }}" = "native" ]; then export QD_METAL_NATIVE_FLOAT_ATOMICS=1; else unset QD_METAL_NATIVE_FLOAT_ATOMICS; fi
          export QD_WANTED_ARCHS=metal
          set +e
          python -m pytest -v --tb=long tests/python/test_ad_atomic.py::test_ad_reduce
          ec=$?
          echo "########## RESULT arm=${{ matrix.arm }} step=A_ad_reduce exit=$ec ##########"
          exit $ec
      - name: Step C - full FEM99 headless
        if: success() || failure()
        run: |
          if [ "${{ matrix.arm }}" = "native" ]; then export QD_METAL_NATIVE_FLOAT_ATOMICS=1; else unset QD_METAL_NATIVE_FLOAT_ATOMICS; fi
          export QD_WANTED_ARCHS=metal
          set +e
          python -m pytest -v --tb=long tests/python/test_fem99_headless.py::test_fem99_headless_stays_finite
          ec=$?
          echo "########## RESULT arm=${{ matrix.arm }} step=C_fem99 exit=$ec ##########"
          exit $ec
