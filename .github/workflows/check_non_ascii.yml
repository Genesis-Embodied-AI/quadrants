name: Check non-ASCII characters
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  check-non-ascii:
    name: Check non-ASCII characters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Compute diff of changed code and doc files
        run: |
          BASE_REF="${{ github.base_ref }}"
          if [ -n "$BASE_REF" ]; then
            BASE="origin/$BASE_REF"
          else
            BASE="origin/main"
          fi
          echo "Comparing against $BASE"
          git diff "$BASE...HEAD" \
            -- '*.md' '*.rst' '*.txt' '*.py' '*.pyi' \
               '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hpp' '*.hxx' '*.cu' '*.cuh' \
            > /tmp/pr_diff.patch
          echo "Diff written ($(wc -l < /tmp/pr_diff.patch) lines)"

      - name: Check for non-ASCII characters in added lines
        run: |
          python python/tools/check_non_ascii.py --diff-file /tmp/pr_diff.patch
