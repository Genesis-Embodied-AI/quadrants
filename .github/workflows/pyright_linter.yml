name: Pyright linter
on:
  workflow_call:
    inputs:
      head_ref:
        description: 'The head ref (branch name or PR ref)'
        required: true
        type: string
      artifact_name:
        description: 'Name of the artifact to download'
        required: true
        type: string
  workflow_dispatch:
jobs:
  build:
    name: Pyright Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
      - name: Python check
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: install stubs, from wheel, and dev install quadrants
        run: |
          set -x
          mkdir -p dist
          mv *.whl dist/
          ls -lh dist/
          unzip dist/*.whl -d dist
          mkdir -p stubs/quadrants/_lib/core
          cp dist/quadrants/_lib/core/quadrants_python.pyi stubs/quadrants/_lib/core/
          touch stubs/quadrants/_lib/core/py.typed
          pip install setuptools_scm
          pip install -e .
      - name: install torch and pyright
        run: |
          # FIXME: pyright is pinned to 1.1.408 because 1.1.409+ flags pre-existing
          # torch.* attribute accesses (torch.zeros, torch.float32, torch.bool, ...) as
          # reportPrivateImportUsage errors -- torch's stubs don't re-export those names
          # via __all__ / `from ... import ... as ...`. To unpin: rework the offending
          # torch imports across the codebase (e.g. `from torch import zeros, float32`,
          # or use `# type: ignore[attr-defined]` on the affected sites) so pyright is
          # happy on the latest release, then drop the version pin here.
          pip install torch 'pyright==1.1.408'
      - name: run pyright
        run: |
          pyright
