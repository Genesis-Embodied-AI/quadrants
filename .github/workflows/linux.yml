name: Linux
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Developing directly on ubuntu arm not supported currently.
        # Need to dev inside a manylinux container, when developing using linux arm.
        OS: ['ubuntu-22.04']
    name: Linux ${{ matrix.OS }} Build
    runs-on: ${{ matrix.OS }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python check
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Linux prerequisites
        run: |
          bash .github/workflows/scripts_new/linux/1_prerequisites.sh
      - name: Linux build
        run: |
          bash .github/workflows/scripts_new/linux/2_build.sh
      - name: Linux install
        run: |
          bash .github/workflows/scripts_new/linux/3_install.sh
      - name: Linux test
        run: |
          bash .github/workflows/scripts_new/linux/4_test.sh
      - name: Upload wheel for CUDA job
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheel
          path: dist/*.whl
      - name: Upload CPU coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cpu
          include-hidden-files: true
          path: |
            .coverage
            coverage.xml
            pytest-coverage.txt

  test-cuda:
    name: Linux CUDA Test
    needs: build
    runs-on: gpu-t4-4-core
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python check
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install CUDA libraries
        run: |
          sudo apt-get install -y libcusolver-dev-12-8 libcusolver-12-8 libcusparse-dev-12-8 libcusparse-12-8 libnvjitlink-12-8 libcublas-12-8
          echo "/usr/local/cuda/targets/x86_64-linux/lib" | sudo tee /etc/ld.so.conf.d/cuda-targets.conf
          sudo ldconfig
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: linux-wheel
      - name: Install quadrants
        run: |
          set -x
          mkdir -p dist
          mv *.whl dist/
          pip install dist/*.whl
      - name: Install test requirements
        run: |
          pip install --group test
          pip install -r requirements_test_xdist.txt
      - name: Run CUDA tests with coverage
        run: |
          bash .github/workflows/scripts_new/linux/4_test_cuda.sh
      - name: Upload CUDA coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cuda
          include-hidden-files: true
          path: |
            .coverage
            coverage.xml

  coverage-comment:
    if: github.event_name == 'pull_request' && always()
    needs: [build, test-cuda]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python check
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Download CPU coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-cpu
          path: coverage-cpu
      - name: Download CUDA coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-cuda
          path: coverage-cuda
      - name: Merge coverage and generate report
        run: |
          pip install "coverage[toml]" diff-cover
          # Combine CPU and CUDA coverage data (CUDA may be absent if that job failed)
          COV_FILES="coverage-cpu/.coverage"
          if [ -f coverage-cuda/.coverage ]; then
            COV_FILES="$COV_FILES coverage-cuda/.coverage"
          fi
          coverage combine $COV_FILES
          coverage xml -o coverage.xml --ignore-errors
          coverage report --show-missing --skip-covered --ignore-errors > pytest-coverage.txt

          git fetch origin ${{ github.base_ref }} --depth=1
          diff-cover coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=0 \
            --format markdown:diff-cover.md || true
          DIFF_COV=$(diff-cover coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=0 2>&1 \
            | grep -oP 'Diff Coverage: \K[\d.]+%' || echo 'N/A')
          # Last line of coverage report is "TOTAL ... NN%"
          OVERALL=$(tail -1 pytest-coverage.txt | grep -oP '\d+%' || echo 'N/A')
          {
            echo '## Coverage Report'
            echo ''
            echo '| Metric | Value |'
            echo '|--------|-------|'
            echo "| **Diff coverage** (changed lines only) | **${DIFF_COV}** |"
            echo "| Overall project coverage | ${OVERALL} |"
            echo ''
            echo '<details>'
            echo '<summary>Changed files coverage details</summary>'
            echo ''
            cat diff-cover.md
            echo ''
            echo '</details>'
            echo ''
            echo '<details>'
            echo '<summary>Full coverage report (files below 100%)</summary>'
            echo ''
            echo '```'
            head -200 pytest-coverage.txt
            echo '```'
            echo ''
            echo '</details>'
          } > coverage-comment.md
      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage-comment.md
      - name: Diff coverage check
        run: |
          pip install diff-cover
          diff-cover coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=80
